[env]
monitor_raw = true
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.partitions = noota_3gffat.csv ;3.0MB FFAT
; noota_ffat.csv ;2.0MB FFAT
; default_ffat.csv ;1.4MB FFAT
lib_deps =
build_flags =

; MIXIN: Completely optional external 128x64 SSD1306 OLED screen for status
[display128x64]
lib_deps =
	adafruit/Adafruit SSD1306@^2.5.16
	adafruit/Adafruit GFX Library@^1.12.4
build_flags =
	-DENABLE_DISPLAY_128x64

; MIXIN: When present, use WS2812 RGBLED as "display"
[displayrgbled]
lib_deps = adafruit/Adafruit NeoPixel@^1.15.2
build_flags = -DENABLE_DISPLAY_RGBLED

; MIXIN: Completely optional PSRAM as destination for watch dump, falls back to flash
[psram]
lib_deps = tobozo/ESP32-PSRamFS@^1.0.8
build_flags = -DENABLE_PSRAM

; Corresponds to the PCB in the repository
[env:esp32_s3_supermini]
board = esp32-s3-fh4r2 ; 4MB flash, 2MB psram
lib_deps = 
	${psram.lib_deps}
	${display128x64.lib_deps}
build_flags =
	${psram.build_flags}
	${display128x64.build_flags}
	-DPIN_I2C_SDA=8
	-DPIN_I2C_SCL=9
	-DPIN_IRDA_RX=7
	-DPIN_IRDA_TX=6
	-DLOG_LEVEL=2
	-DSCREEN_ROTATION=2

[env:lolin_s2_mini]
board = lolin_s2_mini
board_build.mcu = esp32s2

[env:lolin_s2_mini-display128x64]
board = lolin_s2_mini 
lib_deps = 
	${display128x64.lib_deps}
build_flags =
	${display128x64.build_flags}

[env:lolin_s2_mini-display128x64-psram]
board = lolin_s2_mini
lib_deps =
	${display128x64.lib_deps}
	${psram.lib_deps}
build_flags =
	${display128x64.build_flags}
	${psram.build_flags}
